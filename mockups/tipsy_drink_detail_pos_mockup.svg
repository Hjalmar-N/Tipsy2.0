    </linearGradient>
    <linearGradient id="accent" x1="230" y1="0" x2="850" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4B662"/>
      <stop offset="1" stop-color="#D88937"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="874" cy="184" r="220" fill="#F4B662" fill-opacity="0.08"/>
  <rect x="180" y="160" width="720" height="1596" rx="44" fill="url(#shell)"/>
  <rect x="181.5" y="161.5" width="717" height="1593" rx="42.5" stroke="white" stroke-opacity="0.06" stroke-width="3"/>

  <text x="230" y="254" fill="#8FA0B5" font-size="28" font-weight="550" font-family="Inter, Segoe UI, Arial, sans-serif">Back</text>
  <text x="230" y="346" fill="#F6F7F9" font-size="72" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">Gin Tonic</text>
  <text x="232" y="400" fill="#A7B1BF" font-size="26" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif">Ready to pour</text>

  <rect x="230" y="462" width="620" height="238" rx="30" fill="#11161D" fill-opacity="0.75"/>
