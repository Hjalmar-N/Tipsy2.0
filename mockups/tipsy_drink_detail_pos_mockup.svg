  <text x="264" y="1420" fill="#A9B4C2" font-size="24" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif">Selected serve</text>
  <text x="264" y="1470" fill="#F4F6F8" font-size="28" font-weight="650" font-family="Inter, Segoe UI, Arial, sans-serif">Gin 60 ml + Tonic 150 ml</text>

