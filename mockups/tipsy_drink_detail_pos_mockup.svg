  <text x="800" y="968" text-anchor="end" fill="#98A5B5" font-size="28" font-weight="550" font-family="Inter, Segoe UI, Arial, sans-serif">40 ml</text>

  <text x="280" y="1106" fill="#11151B" font-size="34" font-weight="750" font-family="Inter, Segoe UI, Arial, sans-serif">6 cl</text>
