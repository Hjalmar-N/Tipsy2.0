<svg width="1080" height="1920" viewBox="0 0 1080 1920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="130" y1="40" x2="970" y2="1880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171B22"/>
      <stop offset="1" stop-color="#080A0F"/>
    </linearGradient>
    <linearGradient id="shell" x1="180" y1="150" x2="900" y2="1770" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A202A" stop-opacity="0.97"/>
