  <text x="280" y="1244" fill="#F4F6F8" font-size="32" font-weight="650" font-family="Inter, Segoe UI, Arial, sans-serif">8 cl</text>
  <text x="800" y="1244" text-anchor="end" fill="#98A5B5" font-size="28" font-weight="550" font-family="Inter, Segoe UI, Arial, sans-serif">80 ml</text>

