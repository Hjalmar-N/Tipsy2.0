[env:esp32-s3-devkitc-1]
# ESP32-S3 Arduino target used for early bring-up and application development.
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

# Keep desktop preview sources out of the embedded firmware build.
build_src_filter =
    +<*>
    -<desktop_preview/>

# Keep serial settings explicit for reliable boot/runtime logging.
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

# LittleFS image support for persistent JSON data files.
board_build.filesystem = littlefs

# Do not lock pin mappings or display setup here yet; those will move into
# project-owned config headers once the real hardware is finalized.

lib_deps =
    ; UI framework
    lvgl/lvgl@^9.2.2
    moononournation/GFX Library for Arduino@1.4.6
    Wire
    ; JSON storage for drinks, ingredients, pump map, and settings
    bblanchon/ArduinoJson@^6.21.5

lib_ignore =
    ; Enable TFT_eSPI for hardware
    ; TFT_eSPI

build_flags =
    ; Modern C++ support for the layered architecture.
    -std=gnu++17
    ; Let LVGL include its config in the common Arduino/PlatformIO style.
    -D LV_CONF_INCLUDE_SIMPLE
    ; Disable mock mode to start true hardware bring-up
    -D TIPSY_USE_MOCK_HAL=0
    ; Fixed first-generation hardware capacity.
    -D TIPSY_PUMP_COUNT=6

build_unflags =
    ; Avoid accidental older language settings inherited from external defaults.
    -std=gnu++11

[env:desktop-preview-win]
# Native Windows preview build that reuses the real LVGL Tipsy UI flow in a desktop window.
platform = native

lib_deps =
    lvgl/lvgl@^9.2.2

build_src_filter =
    -<*>
    +<desktop_preview/>
    +<ui/generated/ui.cpp>

build_flags =
    -std=gnu++17
    -D LV_CONF_INCLUDE_SIMPLE
    ; LVGL includes LV_CONF_PATH from its own library sources, so this must be
    ; resolvable through compiler include directories, not as a repo-relative path.
    -D LV_CONF_PATH=\"lv_conf.h\"
    -D TIPSY_DESKTOP_PREVIEW=1
    -D TIPSY_PUMP_COUNT=6
    -I src
    -I src/desktop_preview
    ; Win32 libraries commonly needed by LVGL's Windows desktop backend.
    -luser32
    -lgdi32
    -limm32
    -lcomctl32

build_unflags =
    -std=gnu++11

[env:tipsy-sim-win]
# Native console simulation for validating product logic before hardware arrives.
platform = native

lib_deps =
    bblanchon/ArduinoJson@^6.21.5

build_src_filter =
    -<*>
    +<simulation/>
    +<app/MachineController.cpp>
    +<app/models/>
    +<app/services/>
    +<domain/>
    +<storage/>
    +<pumps/MockPumpDriver.cpp>
    +<pumps/PumpController.cpp>
    +<hal/mock/>

build_flags =
    -std=gnu++17
    -D TIPSY_PUMP_COUNT=6
    -D TIPSY_SIMULATION=1
    -I src
    -I src/desktop_preview

build_unflags =
    -std=gnu++11
